<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>赛事详情 · 江雪杯</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text x='50' y='72' font-size='66' text-anchor='middle' fill='%23c8aa6e'>%F0%9F%8F%86</text></svg>" />
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      bg: '#0a0e1a', panel: '#141a2a', panel2: '#1c2338', border: '#2a3148',
      gold: '#c8aa6e', goldhi: '#f0d486', radiant: '#92a629', radianthi: '#b5cf3b',
      dire: '#c23c2a', direhi: '#e85a45', muted: '#7a8499',
    }}}};
  </script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <style>
    body { background: linear-gradient(180deg,#0a0e1a,#06090f); color:#e8eaed; min-height:100vh;
      font-family:"Noto Sans SC","Microsoft YaHei",system-ui,sans-serif; }
    .panel { background: linear-gradient(180deg, rgba(28,35,56,.85), rgba(20,26,42,.85));
      border:1px solid #2a3148; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .gold-text { background: linear-gradient(180deg,#f0d486,#c8aa6e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    input, select { background:#0a0e1a; border:1px solid #2a3148; border-radius:6px; padding:6px 10px; color:#e8eaed; font-size:14px; }
    input:focus, select:focus { border-color:#c8aa6e; outline:none; }
    .btn { padding:5px 12px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; border:0; transition:all .15s; }
    .btn-primary { background:#c8aa6e; color:#0a0e1a; } .btn-primary:hover:not(:disabled){ background:#f0d486; }
    .btn-ghost { background:transparent; color:#7a8499; border:1px solid #2a3148; } .btn-ghost:hover{ color:#f0d486; border-color:#c8aa6e; }
    .tab-active { color:#f0d486; border-bottom:2px solid #c8aa6e; }
    .avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; }
    .badge { font-size:11px; padding:2px 8px; border-radius:999px; font-weight:700; }
  </style>
</head>
<body class="antialiased">

{% include "_nav.html" %}

<div x-data="tournamentPage({{ tournament_id }})" x-init="init()" class="max-w-5xl mx-auto px-4 py-6">

  <div x-show="loading" class="text-center py-12 text-muted">加载中…</div>
  <div x-show="!loading && !t" class="panel p-12 text-center text-muted">找不到该赛事 · <a href="/tournaments" class="text-gold">返回列表</a></div>

  <template x-if="t">
    <div>
      <!-- 头部（有封面图就在顶部显示横幅） -->
      <header class="panel mb-4 overflow-hidden">
        <template x-if="t.cover_url">
          <img :src="coverSrc(t.cover_url)" class="w-full h-44 object-cover" />
        </template>
        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <a href="/tournaments" class="text-xs text-muted hover:text-gold">← 全部赛事</a>
              <h1 class="text-2xl font-black gold-text mt-1 truncate" x-text="t.name"></h1>
              <p class="text-sm text-muted mt-1" x-show="t.description" x-text="t.description"></p>
            </div>
            <span class="badge shrink-0" :class="statusClass(t.status)" x-text="statusLabel(t.status)"></span>
          </div>
        </div>
        <!-- 管理员：状态流转 + 封面 -->
        <div class="px-5 pb-4 pt-3 border-t border-border" x-show="me.is_admin">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs text-muted">状态：</span>
            <template x-for="s in ['registration','auction','bracket','finished']" :key="s">
              <button class="btn" :class="t.status===s?'btn-primary':'btn-ghost'" @click="setStatus(s)" x-text="statusLabel(s)"></button>
            </template>
            <span class="text-xs text-muted ml-2">每队预算 <span class="text-gold" x-text="t.per_team_budget"></span></span>
          </div>
          <div class="flex items-center gap-2 mt-2 flex-wrap">
            <span class="text-xs text-muted shrink-0">封面：</span>
            <input type="file" accept="image/*" @change="uploadCover($event)"/>
            <span class="text-xs text-muted" x-show="coverBusy">上传中…</span>
          </div>
          <div class="mt-3">
            <button class="btn btn-ghost text-direhi" style="border-color:rgba(232,90,69,.4)" @click="del()">🗑 删除赛事</button>
          </div>
        </div>
      </header>

      <!-- Tabs -->
      <nav class="flex gap-1 mb-4 border-b border-border text-sm">
        <template x-for="tb in tabs" :key="tb.key">
          <button @click="tab=tb.key" class="px-4 py-2.5 font-bold transition"
                  :class="tab===tb.key?'tab-active':'text-muted hover:text-white'" x-text="tb.label"></button>
        </template>
      </nav>

      <!-- ===== 报名 ===== -->
      <section x-show="tab==='signup'" class="panel p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-gold">报名选手 <span class="text-muted font-normal" x-text="`(${signups.length})`"></span></h2>
          <div x-show="me.logged_in && t.status==='registration'">
            <button class="btn btn-primary" x-show="!iSignedUp" @click="register()">我要报名</button>
            <button class="btn btn-ghost" x-show="iSignedUp" @click="withdraw()">退赛</button>
          </div>
          <p class="text-xs text-muted" x-show="!me.logged_in"><a href="/me" class="text-gold">登录</a>后可报名</p>
        </div>

        <!-- 管理员加人 -->
        <div class="mb-4 p-3 bg-panel2 rounded" x-show="me.is_admin">
          <div class="text-xs text-muted mb-2">管理员 · 添加报名选手</div>
          <input type="text" x-model="poolQuery" placeholder="搜玩家昵称 / account_id…" class="w-full mb-2"/>
          <div class="max-h-44 overflow-y-auto space-y-1" x-show="poolQuery">
            <template x-for="p in poolCandidates" :key="p.account_id">
              <div class="flex items-center gap-2 text-sm py-1">
                <img class="avatar" :src="avatarOf(p.account_id)" onerror="this.src='/static/default-avatar.svg'"/>
                <span class="flex-1 truncate" x-text="p.name"></span>
                <button class="btn btn-ghost text-xs" @click="adminAddSignup(p.account_id)">＋ 加入</button>
              </div>
            </template>
            <div x-show="poolCandidates.length===0" class="text-xs text-muted py-2">没有匹配的未报名玩家</div>
          </div>
        </div>

        <div x-show="signups.length===0" class="text-sm text-muted text-center py-6">还没有人报名</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
          <template x-for="s in signups" :key="s.account_id">
            <div class="bg-panel2 rounded p-3">
              <div class="flex items-center gap-2 mb-2">
                <img class="avatar" :src="avatarOf(s.account_id)" onerror="this.src='/static/default-avatar.svg'"/>
                <a :href="`/player/${s.account_id}`" class="flex-1 truncate text-sm font-bold hover:text-gold" x-text="nameOf(s.account_id)"></a>
                <span class="badge bg-gold/20 text-goldhi" x-show="s.is_captain">队长</span>
                <span class="badge bg-panel text-muted" x-show="s.team_id" x-text="teamName(s.team_id)"></span>
                <button class="text-direhi/60 hover:text-direhi text-xs" x-show="me.is_admin" @click="adminRemoveSignup(s.account_id)">✕</button>
              </div>
              <div class="grid grid-cols-5 gap-1 text-center text-[11px]">
                <div><div class="text-muted">天梯分</div><div class="font-bold gold-text" x-text="mmrOf(s.account_id) ?? '—'"></div></div>
                <div><div class="text-muted">实力分</div><div class="font-bold" x-text="skillOf(s.account_id) ?? '—'"></div></div>
                <div><div class="text-muted">身价</div><div class="font-bold text-gold" x-text="s.valuation ?? '—'"></div></div>
                <div><div class="text-muted">擅长位</div><div class="font-bold" x-text="positionsOf(s.account_id)"></div></div>
                <div><div class="text-muted">30天胜率</div><div class="font-bold" x-text="winrate30Of(s.account_id)"></div></div>
              </div>
            </div>
          </template>
        </div>
        <p x-show="msg" class="mt-3 text-sm" :class="msg.startsWith('✓')?'text-radianthi':'text-direhi'" x-text="msg"></p>
      </section>

      <!-- ===== 选手身价 ===== -->
      <section x-show="tab==='valuation'" class="panel p-5">
        <h2 class="font-bold text-gold mb-3">选手身价 <span class="text-xs text-muted font-normal" x-show="me.is_admin">· 管理员可编辑</span></h2>
        <div x-show="signups.length===0" class="text-sm text-muted text-center py-4">还没有报名选手</div>
        <div class="space-y-1">
          <template x-for="s in signups" :key="s.account_id">
            <div class="flex items-center gap-2 bg-panel2 rounded px-2 py-1.5 text-sm flex-wrap">
              <img class="avatar" style="width:26px;height:26px" :src="avatarOf(s.account_id)" onerror="this.src='/static/default-avatar.svg'"/>
              <span class="font-bold truncate" style="min-width:70px" x-text="nameOf(s.account_id)"></span>
              <span class="text-xs text-muted">天梯 <span class="text-gray-300" x-text="mmrOf(s.account_id) ?? '—'"></span> · 实力 <span class="text-gray-300" x-text="skillOf(s.account_id) ?? '—'"></span> · 30天 <span class="text-gray-300" x-text="winrate30Of(s.account_id)"></span></span>
              <template x-if="me.is_admin">
                <span class="flex items-center gap-1 ml-auto">
                  <input type="number" min="0" style="width:84px" x-model.number="valDraft[s.account_id]"
                         @keydown.enter="saveValuation(s.account_id)" placeholder="身价(回车确定)"/>
                  <button class="btn btn-ghost" @click="saveValuation(s.account_id)">设</button>
                </span>
              </template>
              <span x-show="!me.is_admin" class="ml-auto text-gold font-mono">身价 <span x-text="s.valuation ?? '—'"></span></span>
            </div>
          </template>
        </div>
        <p x-show="msg" class="mt-2 text-sm" :class="msg.startsWith('✓')?'text-radianthi':'text-direhi'" x-text="msg"></p>
      </section>

      <!-- ===== 队伍 & 选马拍卖 ===== -->
      <section x-show="tab==='auction'" class="space-y-4">
        <!-- 建队（管理员） -->
        <div class="panel p-4" x-show="me.is_admin">
          <h3 class="font-bold text-gold mb-2 text-sm">建队</h3>
          <div class="flex items-end gap-2 flex-wrap">
            <div><label class="block text-xs text-muted mb-1">队名</label><input x-model="teamForm.name" placeholder="战队名"/></div>
            <div><label class="block text-xs text-muted mb-1">队长（可选）</label>
              <select x-model.number="teamForm.captain">
                <option :value="null">— 不指定 —</option>
                <template x-for="s in signups" :key="s.account_id"><option :value="s.account_id" x-text="nameOf(s.account_id)"></option></template>
              </select></div>
            <div><label class="block text-xs text-muted mb-1">预算（默认 <span x-text="t.per_team_budget"></span>）</label>
              <input type="number" min="0" x-model.number="teamForm.budget" :placeholder="t.per_team_budget"/></div>
            <button class="btn btn-primary" @click="newTeam()">建队</button>
          </div>
        </div>

        <!-- 队伍卡 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <template x-for="tm in teams" :key="tm.id">
            <div class="panel p-4">
              <div class="flex items-center justify-between mb-1">
                <div class="font-bold" x-text="tm.name"></div>
                <button x-show="me.is_admin" @click="delTeam(tm.id)" class="text-direhi/60 hover:text-direhi text-xs">解散</button>
              </div>
              <div class="text-xs text-muted mb-2">队长：<span x-text="tm.captain_account_id ? nameOf(tm.captain_account_id) : '—'"></span></div>
              <div class="text-xs mb-1 flex items-center gap-1 flex-wrap">
                <span>预算</span>
                <span class="text-gold font-mono" x-text="teamSpent(tm.id)"></span><span>/</span>
                <template x-if="me.is_admin">
                  <span class="flex items-center gap-1">
                    <input type="number" min="0" style="width:70px" class="text-xs" x-model.number="tm.budget" :placeholder="t.per_team_budget"
                           @keydown.enter="saveBudget(tm)"/>
                    <button class="btn btn-ghost text-xs" @click="saveBudget(tm)">改</button>
                  </span>
                </template>
                <span x-show="!me.is_admin" class="font-mono" x-text="teamBudget(tm)"></span>
                <span class="text-muted">（剩 <span :class="teamBudget(tm)-teamSpent(tm.id) < 0 ? 'text-direhi font-bold' : ''" x-text="teamBudget(tm)-teamSpent(tm.id)"></span>）</span>
              </div>
              <div class="h-1.5 bg-bg rounded mb-2 overflow-hidden"><div class="h-full" :class="teamSpent(tm.id) > teamBudget(tm) ? 'bg-dire' : 'bg-gold'" :style="`width:${Math.min(100,(teamSpent(tm.id)/(teamBudget(tm)||1))*100)}%`"></div></div>
              <div class="space-y-1">
                <template x-for="s in teamRoster(tm.id)" :key="s.account_id">
                  <div class="flex items-center gap-2 text-sm bg-panel2 rounded px-2 py-1">
                    <img class="avatar" style="width:24px;height:24px" :src="avatarOf(s.account_id)" onerror="this.src='/static/default-avatar.svg'"/>
                    <span class="flex-1 truncate" x-text="nameOf(s.account_id)"></span>
                    <span class="badge bg-gold/20 text-goldhi" x-show="s.is_captain">队长</span>
                    <span class="text-gold font-mono" x-show="!s.is_captain" x-text="s.auction_price"></span>
                    <button x-show="me.is_admin && !s.is_captain" @click="unassign(s.account_id)" class="text-direhi/60 hover:text-direhi text-xs">撤</button>
                  </div>
                </template>
                <div x-show="teamRoster(tm.id).length===0" class="text-xs text-muted">暂无队员</div>
              </div>
            </div>
          </template>
          <div x-show="teams.length===0" class="text-sm text-muted">还没有队伍<span x-show="me.is_admin">，先在上面建队</span></div>
        </div>

        <!-- 待拍选手 -->
        <div class="panel p-4">
          <h3 class="font-bold text-gold mb-2 text-sm">待拍选手 <span class="text-muted font-normal" x-text="`(${unassignedPlayers().length})`"></span></h3>
          <div class="space-y-1">
            <template x-for="s in unassignedPlayers()" :key="s.account_id">
              <div class="flex items-center gap-2 bg-panel2 rounded px-2 py-1.5 text-sm flex-wrap">
                <img class="avatar" style="width:26px;height:26px" :src="avatarOf(s.account_id)" onerror="this.src='/static/default-avatar.svg'"/>
                <span class="font-bold truncate" style="min-width:70px" x-text="nameOf(s.account_id)"></span>
                <span class="text-xs text-muted">身价 <span class="text-gold" x-text="s.valuation ?? '—'"></span> · 天梯 <span x-text="mmrOf(s.account_id) ?? '—'"></span> · 实力 <span x-text="skillOf(s.account_id) ?? '—'"></span></span>
                <template x-if="canAssign">
                  <span class="flex items-center gap-1 ml-auto">
                    <select class="text-xs" x-model.number="assignTeam[s.account_id]">
                      <option :value="undefined">队伍</option>
                      <template x-for="tm in assignableTeams()" :key="tm.id"><option :value="tm.id" x-text="tm.name"></option></template>
                    </select>
                    <input class="text-xs" style="width:60px" type="number" min="0" placeholder="价" x-model.number="assignPrice[s.account_id]"
                           @keydown.enter="assign(s.account_id)"/>
                    <button class="btn btn-ghost text-xs" @click="assign(s.account_id)">录入</button>
                  </span>
                </template>
              </div>
            </template>
            <div x-show="unassignedPlayers().length===0" class="text-xs text-muted">没有待拍选手</div>
          </div>
          <p x-show="msg" class="mt-2 text-sm" :class="msg.startsWith('✓')?'text-radianthi':'text-direhi'" x-text="msg"></p>
        </div>
      </section>

      <!-- ===== 赛程（TI 式分轮） ===== -->
      <section x-show="tab==='bracket'" class="space-y-4">
        <div class="panel p-4" x-show="me.is_admin">
          <h3 class="font-bold text-gold mb-2 text-sm">添加对阵</h3>
          <div class="grid grid-cols-2 md:grid-cols-6 gap-2 items-end">
            <div><label class="block text-xs text-muted mb-1">轮次</label><input x-model="matchForm.round_name" placeholder="小组赛/决赛"/></div>
            <div><label class="block text-xs text-muted mb-1">队伍A</label><select x-model.number="matchForm.team_a_id"><option :value="undefined">—</option><template x-for="tm in teams" :key="tm.id"><option :value="tm.id" x-text="tm.name"></option></template></select></div>
            <div><label class="block text-xs text-muted mb-1">队伍B</label><select x-model.number="matchForm.team_b_id"><option :value="undefined">—</option><template x-for="tm in teams" :key="tm.id"><option :value="tm.id" x-text="tm.name"></option></template></select></div>
            <div><label class="block text-xs text-muted mb-1">BO</label><input type="number" min="1" x-model.number="matchForm.best_of"/></div>
            <div><label class="block text-xs text-muted mb-1">时间(可选)</label><input x-model="matchForm.scheduled_time" placeholder="如 6/1 20:00"/></div>
            <button class="btn btn-primary" @click="newMatch()">添加</button>
          </div>
        </div>

        <div x-show="matches.length===0" class="panel p-8 text-center text-muted">还没有赛程</div>
        <div class="flex gap-4 overflow-x-auto pb-2" x-show="matches.length">
          <template x-for="rd in rounds()" :key="rd.name">
            <div class="shrink-0" style="min-width:240px">
              <div class="text-sm font-bold text-gold mb-2" x-text="rd.name || '未命名轮次'"></div>
              <div class="space-y-3">
                <template x-for="m in rd.matches" :key="m.id">
                  <div class="panel p-3">
                    <div class="flex items-center justify-between gap-2" :class="m.winner_team_id && m.winner_team_id===m.team_a_id ? 'text-radianthi font-bold' : ''">
                      <span class="truncate text-sm" x-text="teamName(m.team_a_id) || '待定'"></span>
                      <span class="font-mono" x-text="m.score_a"></span>
                    </div>
                    <div class="flex items-center justify-between gap-2 mt-1" :class="m.winner_team_id && m.winner_team_id===m.team_b_id ? 'text-radianthi font-bold' : ''">
                      <span class="truncate text-sm" x-text="teamName(m.team_b_id) || '待定'"></span>
                      <span class="font-mono" x-text="m.score_b"></span>
                    </div>
                    <div class="text-[10px] text-muted mt-1">BO<span x-text="m.best_of"></span><span x-show="m.scheduled_time"> · </span><span x-text="m.scheduled_time||''"></span></div>
                    <div class="mt-2 pt-2 border-t border-border" x-show="me.is_admin">
                      <div class="flex items-center gap-1 text-xs flex-wrap">
                        <input type="number" min="0" style="width:40px" x-model.number="m.score_a"/><span>:</span><input type="number" min="0" style="width:40px" x-model.number="m.score_b"/>
                        <select class="text-xs" x-model.number="m.winner_team_id">
                          <option :value="null">胜方</option>
                          <option :value="m.team_a_id" x-text="teamName(m.team_a_id)||'A'"></option>
                          <option :value="m.team_b_id" x-text="teamName(m.team_b_id)||'B'"></option>
                        </select>
                        <button class="btn btn-ghost text-xs" @click="saveMatch(m)">存</button>
                        <button class="text-direhi/60 hover:text-direhi" @click="delMatch(m.id)">✕</button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </section>
    </div>
  </template>
</div>

<script>
function tournamentPage(tid) {
  return {
    tid, loading: true, msg: '',
    me: { logged_in:false, is_admin:false, account_id:null },
    t: null, signups: [], teams: [], matches: [],
    playerMap: {}, profiles: {},
    tab: 'signup',
    tabs: [
      {key:'signup', label:'报名'}, {key:'valuation', label:'身价'},
      {key:'auction', label:'队伍&拍卖'}, {key:'bracket', label:'赛程'},
    ],
    poolQuery: '', coverBusy: false, win30: {},
    teamForm: { name:'', captain:null, budget:null },
    matchForm: { round_name:'', team_a_id:undefined, team_b_id:undefined, best_of:1, scheduled_time:'' },
    assignTeam: {}, assignPrice: {}, valDraft: {},

    async init() {
      const [me, detail, stats, profiles] = await Promise.all([
        fetch('/api/me').then(r=>r.json()).catch(()=>({})),
        fetch(`/api/tournaments/${this.tid}`).then(r=>r.json()).catch(()=>null),
        fetch('/api/stats').then(r=>r.json()).catch(()=>({})),
        fetch('/api/profiles').then(r=>r.json()).catch(()=>({})),
      ]);
      this.me = me || {};
      this.profiles = profiles || {};
      const players = stats?.data?.players || [];
      this.playerMap = Object.fromEntries(players.map(p => [p.account_id, p]));
      this.allPlayers = players;
      this._computeWin30(stats?.data?.matches || []);
      this._applyDetail(detail);
      this.loading = false;
    },
    _computeWin30(matches) {
      const cutoff = Math.floor(Date.now()/1000) - 30*86400;
      const w = {};
      for (const m of matches) {
        if ((m.start_ts||0) < cutoff) continue;
        for (const p of m.players || []) {
          if (!p.account_id) continue;
          const r = w[p.account_id] || (w[p.account_id] = {w:0,n:0});
          r.n++; if (p.win) r.w++;
        }
      }
      this.win30 = w;
    },
    _applyDetail(d) {
      if (!d || d.error) { this.t = null; return; }
      this.t = d.tournament; this.signups = d.signups || []; this.teams = d.teams || []; this.matches = d.matches || [];
      this.valDraft = Object.fromEntries(this.signups.map(s => [s.account_id, s.valuation]));
    },
    async reload() {
      const d = await fetch(`/api/tournaments/${this.tid}`).then(r=>r.json()).catch(()=>null);
      this._applyDetail(d);
    },

    nameOf(aid){ return this.playerMap[aid]?.name || ('id_'+aid); },
    avatarOf(aid){ return this.profiles[aid]?.avatar_url || this.playerMap[aid]?.steam_avatar || '/static/default-avatar.svg'; },
    teamName(teamId){ return (this.teams.find(t=>t.id===teamId)||{}).name || ''; },
    coverSrc(u){ if(!u) return ''; return (u.startsWith('http')||u.startsWith('/')) ? u : '/img/'+encodeURIComponent(u); },
    mmrOf(aid){ return this.profiles[aid]?.mmr ?? null; },
    skillOf(aid){ return this.playerMap[aid]?.skill_score ?? null; },
    positionsOf(aid){ const p=this.profiles[aid]?.positions; return (p && p.length) ? p.join('/') : '—'; },
    winrate30Of(aid){ const r=this.win30[aid]; return (r && r.n) ? Math.round(r.w/r.n*100)+'%' : '—'; },
    teamBudget(tm){ return (tm.budget != null) ? tm.budget : (this.t?.per_team_budget || 0); },
    teamRoster(teamId){ return this.signups.filter(s=>s.team_id===teamId); },
    teamSpent(teamId){ return this.signups.filter(s=>s.team_id===teamId).reduce((a,s)=>a+(s.auction_price||0),0); },
    unassignedPlayers(){ return this.signups.filter(s=>!s.team_id && !s.is_captain); },
    get canAssign(){ return this.me.is_admin || this.teams.some(tm=>tm.captain_account_id===this.me.account_id); },
    assignableTeams(){ return this.me.is_admin ? this.teams : this.teams.filter(tm=>tm.captain_account_id===this.me.account_id); },
    rounds(){ const order=[],map={}; for(const m of this.matches){ const k=m.round_name||''; if(!(k in map)){ map[k]={name:k,matches:[]}; order.push(k);} map[k].matches.push(m);} return order.map(k=>map[k]); },
    statusLabel(s){ return {registration:'报名中',auction:'拍卖中',bracket:'进行中',finished:'已结束'}[s]||s; },
    statusClass(s){ return {registration:'bg-radiant/20 text-radianthi',auction:'bg-gold/20 text-goldhi',bracket:'bg-gold/20 text-goldhi',finished:'bg-panel2 text-muted'}[s]||'bg-panel2 text-muted'; },
    get iSignedUp(){ return this.signups.some(s => s.account_id === this.me.account_id); },
    get poolCandidates(){
      const q = (this.poolQuery||'').trim().toLowerCase();
      if (!q) return [];
      const signed = new Set(this.signups.map(s=>s.account_id));
      return (this.allPlayers||[]).filter(p => !signed.has(p.account_id) &&
        ((p.name||'').toLowerCase().includes(q) || String(p.account_id).includes(q))).slice(0,30);
    },

    async _post(url, body, method='POST') {
      const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined});
      return r.json().catch(()=>({}));
    },
    flash(m){ this.msg=m; setTimeout(()=>this.msg='',2500); },

    async register(){ const j=await this._post(`/api/tournaments/${this.tid}/signup`); if(j.ok){ await this.reload(); this.flash('✓ 已报名'); } else this.flash('✗ '+(j.error||'失败')); },
    async withdraw(){ const j=await this._post(`/api/tournaments/${this.tid}/signup`,null,'DELETE'); if(j.ok){ await this.reload(); this.flash('✓ 已退赛'); } else this.flash('✗ '+(j.error||'失败')); },
    async setStatus(s){ const j=await this._post(`/api/tournaments/${this.tid}`,{status:s},'PATCH'); if(j.ok){ this.t=j.tournament; } else this.flash('✗ '+(j.error||'失败')); },
    async uploadCover(e){
      const file=e.target.files[0]; if(!file) return;
      this.coverBusy=true;
      try {
        const fd=new FormData(); fd.append('image', file);
        const up=await fetch('/api/tournaments/cover',{method:'POST',body:fd}).then(r=>r.json());
        if(!up.ok){ this.flash('✗ '+(up.error||'上传失败')); return; }
        const j=await this._post(`/api/tournaments/${this.tid}`,{cover_url:up.url},'PATCH');
        if(j.ok){ this.t=j.tournament; this.flash('✓ 封面已更新'); } else this.flash('✗ '+(j.error||'失败'));
      } catch(err){ this.flash('✗ 网络错误'); } finally { this.coverBusy=false; }
    },
    async del(){
      if(!confirm(`确定删除赛事「${this.t.name}」？报名/队伍/赛程都会一起删除，不可恢复。`)) return;
      const j=await this._post(`/api/tournaments/${this.tid}`,null,'DELETE');
      if(j.ok){ window.location.href='/tournaments'; } else this.flash('✗ '+(j.error||'删除失败'));
    },
    // —— 身价 ——
    async saveValuation(aid){ const v=this.valDraft[aid]; const j=await this._post(`/api/tournaments/${this.tid}/valuation`,{account_id:aid, valuation:(v===''||v==null)?null:v}); if(j.ok){ await this.reload(); this.flash('✓ 已设身价'); } else this.flash('✗ '+(j.error||'失败')); },
    // —— 队伍 ——
    async newTeam(){ if(!this.teamForm.name.trim()){ this.flash('✗ 请填队名'); return; } const j=await this._post(`/api/tournaments/${this.tid}/teams`,{name:this.teamForm.name, captain_account_id:this.teamForm.captain, budget:this.teamForm.budget}); if(j.ok){ this.teamForm={name:'',captain:null,budget:null}; await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    async delTeam(id){ if(!confirm('解散该队伍？队员会被释放回待拍池。')) return; const j=await this._post(`/api/tournaments/${this.tid}/teams/${id}`,null,'DELETE'); if(j.ok){ await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    async saveBudget(tm){ const j=await this._post(`/api/tournaments/${this.tid}/teams/${tm.id}`,{budget:tm.budget},'PATCH'); if(j.ok){ await this.reload(); this.flash('✓ 已改预算'); } else this.flash('✗ '+(j.error||'失败')); },
    // —— 拍卖录入 ——
    async assign(aid){ const team=this.assignTeam[aid], price=this.assignPrice[aid];
      if(team==null){ this.flash('✗ 选个队伍'); return; }
      if(price==null||price===''){ this.flash('✗ 填成交价'); return; }
      const j=await this._post(`/api/tournaments/${this.tid}/assign`,{account_id:aid, team_id:team, price});
      if(j.ok){ this.assignTeam[aid]=undefined; this.assignPrice[aid]=undefined; await this.reload(); this.flash('✓ 已录入'); } else this.flash('✗ '+(j.error||'失败')); },
    async unassign(aid){ const j=await this._post(`/api/tournaments/${this.tid}/unassign`,{account_id:aid}); if(j.ok){ await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    // —— 赛程 ——
    async newMatch(){ const j=await this._post(`/api/tournaments/${this.tid}/matches`, this.matchForm); if(j.ok){ this.matchForm={round_name:this.matchForm.round_name, team_a_id:undefined, team_b_id:undefined, best_of:1, scheduled_time:''}; await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    async saveMatch(m){ const j=await this._post(`/api/tournaments/${this.tid}/matches/${m.id}`,{score_a:m.score_a, score_b:m.score_b, winner_team_id:m.winner_team_id}, 'PATCH'); if(j.ok){ this.flash('✓ 已保存'); await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    async delMatch(id){ if(!confirm('删除这个对阵？')) return; const j=await this._post(`/api/tournaments/${this.tid}/matches/${id}`,null,'DELETE'); if(j.ok){ await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
    async adminAddSignup(aid){ const j=await this._post(`/api/tournaments/${this.tid}/signups`,{account_id:aid}); if(j.ok){ await this.reload(); this.poolQuery=''; } else this.flash('✗ '+(j.error||'失败')); },
    async adminRemoveSignup(aid){ if(!confirm('移除该报名选手？')) return; const j=await this._post(`/api/tournaments/${this.tid}/signups/${aid}`,null,'DELETE'); if(j.ok){ await this.reload(); } else this.flash('✗ '+(j.error||'失败')); },
  };
}
</script>
</body></html>
