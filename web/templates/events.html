<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>歌友会 · 江雪杯</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text x='50' y='72' font-size='70' text-anchor='middle' fill='%23c8aa6e'>%F0%9F%8E%A4</text></svg>" />
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      bg: '#0a0e1a', panel: '#141a2a', panel2: '#1c2338', border: '#2a3148',
      gold: '#c8aa6e', goldhi: '#f0d486', radiant: '#92a629', radianthi: '#b5cf3b',
      dire: '#c23c2a', direhi: '#e85a45', muted: '#7a8499',
    }}}};
  </script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at 80% 0%, rgba(168,85,247,.06), transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(146,166,41,.05), transparent 40%),
        linear-gradient(180deg, #0a0e1a, #06090f);
      color: #e8eaed; min-height: 100vh;
      font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    .panel {
      background: linear-gradient(180deg, rgba(28,35,56,.85), rgba(20,26,42,.85));
      border: 1px solid #2a3148; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .gold-text {
      background: linear-gradient(180deg, #f0d486 0%, #c8aa6e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    input, textarea {
      background: #0a0e1a; border: 1px solid #2a3148; border-radius: 6px;
      padding: 8px 12px; color: #e8eaed; font-size: 14px; width: 100%;
    }
    input:focus, textarea:focus { border-color: #c8aa6e; outline: none; }
    label { display: block; font-size: 12px; color: #7a8499; margin-bottom: 4px; }
    .video-wrap {
      position: relative; padding-top: 56.25%; /* 16:9 */
      background: #000; border-radius: 8px; overflow: hidden;
    }
    .video-wrap iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
    }
    .btn { padding: 6px 14px; border-radius: 6px; font-weight: 700; font-size: 13px; transition: all .15s; cursor: pointer; border: 0; }
    .btn-primary { background: #c8aa6e; color: #0a0e1a; }
    .btn-primary:hover:not(:disabled) { background: #f0d486; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: #7a8499; border: 1px solid #2a3148; }
    .btn-ghost:hover { color: #f0d486; border-color: #c8aa6e; }
  </style>
</head>
<body class="antialiased">

{% include "_nav.html" %}

<div x-data="events()" x-init="init()" class="max-w-5xl mx-auto px-4 py-6">

  <!-- ====== 顶部介绍 ====== -->
  <header class="panel p-6 mb-6 relative overflow-hidden">
    <div class="absolute -right-12 -top-12 w-48 h-48 rounded-full opacity-10"
         style="background: radial-gradient(circle, #c084fc, transparent 70%);"></div>
    <div class="relative flex items-center gap-4">
      <span class="text-5xl">🎤</span>
      <div>
        <h1 class="text-3xl font-black gold-text">歌友会</h1>
        <p class="text-sm text-muted mt-1">江雪杯歌友会历次活动记录 · 来自 B 站</p>
      </div>
    </div>
  </header>

  <!-- ====== 添加表单（登录后可见） ====== -->
  <div class="panel p-5 mb-6" x-show="user.logged_in">
    <h3 class="text-sm font-bold text-gold mb-3 flex items-center gap-2">
      <span>✚</span> 添加一场歌友会
    </h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
      <div>
        <label>标题</label>
        <input type="text" x-model="form.title" maxlength="100" placeholder="例如：江雪杯第三届歌友会"/>
      </div>
      <div>
        <label>日期</label>
        <input type="date" x-model="form.event_date"/>
      </div>
    </div>
    <div class="mb-3">
      <label>B 站链接（含 BVID）</label>
      <input type="text" x-model="form.url" placeholder="https://www.bilibili.com/video/BVxxxxxxxx/"/>
    </div>
    <div class="mb-3">
      <label>描述（可选）</label>
      <textarea x-model="form.description" rows="2" maxlength="500"
                placeholder="本次歌友会精彩瞬间 / 参与人 / 主持人……"></textarea>
    </div>
    <div class="flex items-center gap-3">
      <button @click="addEvent()" :disabled="busy" class="btn btn-primary">
        <span x-text="busy ? '提交中…' : '添加'"></span>
      </button>
      <span x-show="msg" :class="msg.startsWith('✓') ? 'text-radianthi text-sm' : 'text-direhi text-sm'"
            x-text="msg"></span>
    </div>
  </div>

  <div class="panel p-5 mb-6 text-center" x-show="!user.logged_in && !loading">
    <p class="text-sm text-muted">登录后才能添加新的歌友会记录</p>
    <a href="/me" class="inline-block mt-2 btn btn-primary">去登录 / 注册</a>
  </div>

  <!-- ====== 事件列表 ====== -->
  <div x-show="loading" class="text-center py-12 text-muted">加载中…</div>

  <div x-show="!loading && eventList.length === 0 && !user.logged_in" class="panel p-12 text-center">
    <div class="text-6xl mb-3">🎙</div>
    <h3 class="text-lg font-bold text-gold mb-2">还没有歌友会记录</h3>
    <p class="text-sm text-muted">登录后可以添加</p>
  </div>

  <div class="space-y-6">
    <template x-for="e in eventList" :key="e.id">
      <article class="panel p-5">
        <div class="flex items-start justify-between gap-3 mb-3">
          <div class="min-w-0 flex-1">
            <h2 class="text-xl font-bold gold-text truncate" x-text="e.title"></h2>
            <div class="text-xs text-muted mt-1 flex items-center gap-3 flex-wrap">
              <span x-show="e.event_date" x-text="`📅 ${e.event_date}`"></span>
              <span x-show="e.bvid" class="font-mono" x-text="e.bvid"></span>
              <a :href="e.url" target="_blank" class="hover:text-gold">原视频 ↗</a>
            </div>
          </div>
          <button x-show="user.logged_in && user.account_id === e.created_by"
                  @click="removeEvent(e.id)"
                  class="text-direhi/60 hover:text-direhi text-sm">删除</button>
        </div>

        <p x-show="e.description" class="text-sm text-muted mb-3 whitespace-pre-wrap" x-text="e.description"></p>

        <div class="video-wrap">
          <iframe :src="`//player.bilibili.com/player.html?bvid=${e.bvid}&autoplay=0&high_quality=1&danmaku=0`"
                  allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
      </article>
    </template>
  </div>

  <footer class="text-center text-xs text-muted mt-8 py-4">
    视频均来自 B 站，版权归原作者所有
  </footer>
</div>

<script>
function events() {
  return {
    loading: true,
    busy: false,
    msg: '',
    user: { logged_in: false, account_id: null },
    eventList: [],
    form: { title: '', url: '', event_date: '', description: '' },

    async init() {
      const [meData, eventsData] = await Promise.all([
        fetch('/api/me').then(r => r.json()).catch(() => ({logged_in:false})),
        fetch('/api/events').then(r => r.json()).catch(() => []),
      ]);
      this.user = meData;
      this.eventList = eventsData || [];
      this.loading = false;
    },

    async addEvent() {
      if (this.busy) return;
      this.busy = true; this.msg = '';
      try {
        const r = await fetch('/api/events', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(this.form),
        });
        const j = await r.json();
        if (j.ok) {
          this.eventList.unshift(j.event);
          this.form = { title: '', url: '', event_date: '', description: '' };
          this.msg = '✓ 已添加';
          setTimeout(() => this.msg = '', 2500);
        } else {
          this.msg = '✗ ' + (j.error || '提交失败');
        }
      } catch (e) {
        this.msg = '✗ 网络错误';
      } finally {
        this.busy = false;
      }
    },

    async removeEvent(id) {
      if (!confirm('确定删除这场歌友会？')) return;
      try {
        const r = await fetch(`/api/events/${id}`, {method: 'DELETE'});
        const j = await r.json();
        if (j.ok) {
          this.eventList = this.eventList.filter(e => e.id !== id);
        } else {
          alert(j.error || '删除失败');
        }
      } catch (e) { alert('网络错误'); }
    },
  };
}
</script>

</body></html>
